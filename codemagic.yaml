workflows:
  ios-release:
    name: Fraterna iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    ios_config:
      bundle_identifier: app.fraterna.beta
    scripts:
      - name: Install Node dependencies
        script: |
          npm ci
      - name: Build web assets
        script: |
          npm run build
      - name: Sync Capacitor
        script: |
          npx cap sync ios
      - name: Setup code signing
        script: |
          xcode-project use-profiles
      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            archive \
            -archivePath build/App.xcarchive
      - name: Export IPA
        script: |
          cd ios/App
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist build/export_options.plist
    artifacts:
      - ios/App/build/export/*.ipa
    publishing:
      email:
        recipients:
          - bahjetjaouhari@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID