workflows:
  ios-release:
    name: Fraterna iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
      ios_signing:
        # Reference the uploaded certificate and profile by name
        # Replace 'fraterna_distribution' and 'fraterna_appstore' with your actual reference names
        certificates:
          - fraterna_distribution
        provisioning_profiles:
          - Fraterna_AppStore_New
    scripts:
      - name: Install Node dependencies
        script: npm ci
      - name: Build web assets
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Debug signing files
        script: |
          echo "=== Checking certificates ==="
          security find-identity -v -p codesigning
          echo ""
          echo "=== Checking provisioning profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
          echo ""
          echo "=== Checking keychains ==="
          security list-keychains
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          cd ios/App

          # Run xcodebuild directly to see full error
          set -e
          xcodebuild -project App.xcodeproj \
            -target App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=VL56K2J6DB \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="Fraterna_AppStore_New" \
            PRODUCT_BUNDLE_IDENTIFIER=app.fraterna.beta \
            2>&1 | tee build_log.txt

          # If archive succeeds, export IPA
          if [ -d build/App.xcarchive ]; then
            xcodebuild -exportArchive \
              -archivePath build/App.xcarchive \
              -exportPath build/ipa \
              -exportOptionsPlist ExportOptions.plist \
              CODE_SIGN_STYLE=Manual \
              DEVELOPMENT_TEAM=VL56K2J6DB
          fi
    artifacts:
      - ios/App/build_log.txt
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - inovaahora.tech@gmail.com
        notify:
          success: true
          failure: true