workflows:
  ios-release:
    name: Fraterna iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
      vars:
        - name: TEAM_ID
          value: "VL56K2J6DB"
    scripts:
      - name: Install Node dependencies
        script: |
          npm ci
      - name: Build web assets
        script: |
          npm run build
      - name: Sync Capacitor
        script: |
          npx cap sync ios
      - name: Configure Xcode project for manual signing
        script: |
          cd ios/App
          # Update project settings for manual signing
          xcodebuild -showBuildSettings -project App.xcodeproj -scheme App
          # Print available provisioning profiles
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || true
      - name: Build iOS Release
        script: |
          cd ios/App
          # Archive for App Store distribution
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="VL56K2J6DB" \
            PROVISIONING_PROFILE_SPECIFIER="Fraterna_AppStore" \
            -allowProvisioningUpdates
      - name: Export IPA
        script: |
          cd ios/App
          # Create export options plist
          cat > build/export_options.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>VL56K2J6DB</string>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF
          # Export IPA
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist build/export_options.plist
    artifacts:
      - ios/App/build/export/*.ipa
    publishing:
      email:
        recipients:
          - bahjetjaouhari@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID