workflows:
  ios-release:
    name: Fraterna iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Node dependencies
        script: npm ci
      - name: Build web assets
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Fetch signing files
        script: |
          # Fetch all signing files (certificates and profiles)
          app-store-connect fetch-signing-files "app.fraterna.beta" \
            --type IOS_APP_STORE \
            --create
      - name: Initialize keychain and add certificates
        script: |
          keychain initialize
          keychain add-certificates
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --project App.xcodeproj \
            --target App
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - inovaahora.tech@gmail.com
        notify:
          success: true
          failure: true