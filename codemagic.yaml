workflows:
  ios-release:
    name: Fraterna iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
      groups:
        - appstore_credentials
      vars:
        BUNDLE_ID: app.fraterna.beta
        TEAM_ID: VL56K2J6DB
    scripts:
      - name: Install Node dependencies
        script: npm ci
      - name: Build web assets
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set up code signing
        script: |
          # This script runs if App Store Connect API credentials are set
          # Codemagic automatically sets up signing when these vars are present:
          # - APP_STORE_CONNECT_KEY_ID
          # - APP_STORE_CONNECT_ISSUER_ID
          # - APP_STORE_CONNECT_KEY_CONTENT (base64)

          if [ -z "$APP_STORE_CONNECT_KEY_ID" ]; then
            echo "⚠️ App Store Connect API credentials not configured"
            echo "Add these environment variables in Codemagic Settings:"
            echo "  - APP_STORE_CONNECT_KEY_ID"
            echo "  - APP_STORE_CONNECT_ISSUER_ID"
            echo "  - APP_STORE_CONNECT_KEY_CONTENT"
            exit 1
          fi

          echo "✓ App Store Connect API credentials found"
          echo "Team ID: $TEAM_ID"
          echo "Bundle ID: $BUNDLE_ID"
      - name: Build iOS
        script: |
          cd ios/App

          # Build with automatic signing
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID"
      - name: Export IPA
        script: |
          cd ios/App

          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist
    artifacts:
      - ios/App/build/ipa/*.ipa
    publishing:
      email:
        recipients:
          - inovaahora.tech@gmail.com
        notify:
          success: true
          failure: true