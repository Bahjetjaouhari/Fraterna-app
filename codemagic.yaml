workflows:
  ios-release:
    name: Fraterna iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
      ios_signing:
        certificates:
          - fraterna_distribution
        provisioning_profiles:
          - Fraterna_AppStore_New
    scripts:
      - name: Install Node dependencies
        script: npm ci
      - name: Build web assets
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build and create IPA
        script: |
          cd ios/App
          set -e

          # Build the app (not archive)
          xcodebuild -project App.xcodeproj \
            -target App \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=VL56K2J6DB \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="Fraterna_AppStore_New" \
            PRODUCT_BUNDLE_IDENTIFIER=app.fraterna.beta

          # Find the built app
          APP_PATH=$(find build/DerivedData -path "*/Release-iphoneos/App.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "✗ App.app not found"
            exit 1
          fi

          echo "✓ Found App at: $APP_PATH"

          # Create IPA
          mkdir -p build/ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r build/ipa/App.ipa Payload
          rm -rf Payload

          echo "✓ IPA created: build/ipa/App.ipa"
          ls -la build/ipa/
    artifacts:
      - ios/App/build/ipa/*.ipa
    publishing:
      email:
        recipients:
          - inovaahora.tech@gmail.com
        notify:
          success: true
          failure: true