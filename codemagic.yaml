workflows:
  ios-release:
    name: Fraterna iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Node dependencies
        script: npm ci
      - name: Build web assets
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Debug - Show installed profiles
        script: |
          echo "=== Checking for provisioning profiles ==="
          echo "Looking in ~/Library/MobileDevice/Provisioning Profiles/"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "Directory does not exist or is empty"
          echo ""
          echo "=== Checking for certificates ==="
          security find-identity -v -p codesigning || echo "No signing identities found"
          echo ""
          echo "=== Checking CM environment variables ==="
          env | grep -i CM_ || echo "No CM_ variables found"
          echo ""
          echo "=== Checking KEYCHAIN ==="
          security list-keychains || echo "No keychains listed"
      - name: Build iOS (no signing for now)
        script: |
          cd ios/App
          # Build without signing first to test
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Create unsigned IPA
        script: |
          cd ios/App
          mkdir -p Payload
          cp -r build/Release-iphoneos/App.app Payload/
          zip -r App.ipa Payload
    artifacts:
      - ios/App/App.ipa
    publishing:
      email:
        recipients:
          - inovaahora.tech@gmail.com
        notify:
          success: true
          failure: true