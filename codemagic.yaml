workflows:
  ios-release:
    name: Fraterna iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
      ios_signing:
        # Reference the uploaded certificate and profile by name
        # Replace 'fraterna_distribution' and 'fraterna_appstore' with your actual reference names
        certificates:
          - fraterna_distribution
        provisioning_profiles:
          - Fraterna_AppStore_New
    scripts:
      - name: Install Node dependencies
        script: npm ci
      - name: Build web assets
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Debug signing files
        script: |
          echo "=== Checking certificates ==="
          security find-identity -v -p codesigning
          echo ""
          echo "=== Checking provisioning profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
          echo ""
          echo "=== Checking keychains ==="
          security list-keychains
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --project App.xcodeproj \
            --target App \
            --verbose
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - inovaahora.tech@gmail.com
        notify:
          success: true
          failure: true