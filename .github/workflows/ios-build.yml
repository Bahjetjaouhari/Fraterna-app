name: iOS Build & Upload to TestFlight

on:
  # Trigger manually from GitHub Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install Apple certificate
        env:
          CERTIFICATE_PEM_BASE64: ${{ secrets.CERTIFICATE_PEM_BASE64 }}
          KEY_PEM_BASE64: ${{ secrets.KEY_PEM_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Decode certificate and key from base64
          printf '%s' "$CERTIFICATE_PEM_BASE64" | base64 --decode > cert.pem
          printf '%s' "$KEY_PEM_BASE64" | base64 --decode > key.pem

          # Verify files decoded correctly
          echo "Certificate size: $(wc -c < cert.pem) bytes"
          echo "Key size: $(wc -c < key.pem) bytes"

          # Verify PEM files are valid
          openssl x509 -in cert.pem -noout -subject
          openssl rsa -in key.pem -passin pass:"$P12_PASSWORD" -noout -check

          # Create .p12 on macOS (ensures macOS compatibility)
          openssl pkcs12 -export \
            -out certificate.p12 \
            -inkey key.pem \
            -in cert.pem \
            -passin pass:"$P12_PASSWORD" \
            -passout pass:"$P12_PASSWORD"

          echo "Created .p12 file: $(wc -c < certificate.p12) bytes"

          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain

          # Import the certificate into the keychain
          security import certificate.p12 \
            -k build.keychain \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Set partition list to allow codesigning
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # Set the keychain as default
          security list-keychains -d user -s build.keychain
          security default-keychain -s build.keychain

          # Verify certificate is installed
          security find-identity -v -p codesigning build.keychain

      - name: Install provisioning profile
        env:
          PROVISION_PROFILE_BASE64: ${{ secrets.PROVISION_PROFILE_BASE64 }}
        run: |
          # Decode the provisioning profile
          printf '%s' "$PROVISION_PROFILE_BASE64" | base64 --decode > profile.mobileprovision

          # Verify the file was decoded correctly
          echo "Profile size: $(wc -c < profile.mobileprovision) bytes"

          # Get the profile UUID
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i profile.mobileprovision 2>/dev/null)")
          echo "Provisioning profile UUID: $UUID"

          # Install the provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision

          # Verify installation
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build IPA
        run: |
          cd ios/App

          # Get the provisioning profile UUID
          PROVISION_PROFILE_PATH=$(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" | head -1)
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i "$PROVISION_PROFILE_PATH" 2>/dev/null)")
          echo "Using provisioning profile UUID: $UUID"

          # Build the archive WITHOUT code signing
          # (Capacitor SPM plugins don't support provisioning profiles,
          #  so we sign only during the export step)
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/App.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=VL56K2J6DB

          # Export the IPA with manual signing
          mkdir -p build/ipa
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA to TestFlight
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          cd ios/App/build/ipa
          IPA_FILE=$(ls *.ipa | head -1)
          echo "Uploading $IPA_FILE to App Store Connect..."
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_FILE" \
            --username "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --bundle-id app.fraterna.beta

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fraterna-iOS
          path: ios/App/build/ipa/*.ipa
          retention-days: 30

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true
          rm -f certificate.p12 cert.pem key.pem profile.mobileprovision