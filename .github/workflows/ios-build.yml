name: iOS Build & Upload to TestFlight

on:
  # Trigger manually from GitHub Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install Apple certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Decode the certificate from base64 (use printf to avoid trailing newline)
          printf '%s' "$BUILD_CERTIFICATE_BASE64" | base64 --decode > certificate.p12

          # Verify the file was decoded correctly
          FILE_SIZE=$(stat -f%z certificate.p12 2>/dev/null || stat -c%s certificate.p12 2>/dev/null)
          echo "Certificate file size: $FILE_SIZE bytes"

          if [ "$FILE_SIZE" -lt 100 ]; then
            echo "ERROR: Certificate file is too small, base64 decode may have failed"
            exit 1
          fi

          # Verify password works with openssl first
          openssl pkcs12 -in certificate.p12 -passin pass:"$P12_PASSWORD" -nokeys -noout 2>/dev/null
          if [ $? -ne 0 ]; then
            echo "ERROR: Certificate password verification failed"
            exit 1
          fi
          echo "Certificate password verified with openssl"

          # Create a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain

          # Import the certificate into the keychain
          security import certificate.p12 \
            -k build.keychain \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Set partition list to allow codesigning
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # Set the keychain as default
          security list-keychains -d user -s build.keychain
          security default-keychain -s build.keychain

          # Verify certificate is installed
          security find-identity -v -p codesigning build.keychain

      - name: Install provisioning profile
        env:
          PROVISION_PROFILE_BASE64: ${{ secrets.PROVISION_PROFILE_BASE64 }}
        run: |
          # Decode the provisioning profile (use printf to avoid trailing newline)
          printf '%s' "$PROVISION_PROFILE_BASE64" | base64 --decode > profile.mobileprovision

          # Verify the file was decoded correctly
          FILE_SIZE=$(stat -f%z profile.mobileprovision 2>/dev/null || stat -c%s profile.mobileprovision 2>/dev/null)
          echo "Profile file size: $FILE_SIZE bytes"

          # Get the profile UUID
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i profile.mobileprovision 2>/dev/null)")
          echo "Provisioning profile UUID: $UUID"

          # Install the provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision

          # Verify installation
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build IPA
        run: |
          cd ios/App

          # Get the provisioning profile UUID and name
          PROVISION_PROFILE_PATH=$(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" | head -1)
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i "$PROVISION_PROFILE_PATH" 2>/dev/null)")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin <<< "$(security cms -D -i "$PROVISION_PROFILE_PATH" 2>/dev/null)")
          echo "Using provisioning profile: $PROFILE_NAME ($UUID)"

          # Build the app
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/App.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=VL56K2J6DB \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            PRODUCT_BUNDLE_IDENTIFIER=app.fraterna.beta \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES

          # Export the IPA
          mkdir -p build/ipa
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fraterna-iOS
          path: ios/App/build/ipa/*.ipa
          retention-days: 30

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true
          rm -f certificate.p12 profile.mobileprovision